version: '3.8'

services:
  db:
    image: postgres:15
    container_name: webtoon_db
    restart: always
    environment:
      POSTGRES_USER: webtoon_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: webtoon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webtoon_network
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U webtoon_admin -d webtoon_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: webtoon_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_CONNECTION: ${DB_CONNECTION}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./Backend:/app
    ports:
      - "8000:8000"
    networks:
      - webtoon_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webtoon_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    networks:
      - webtoon_network

  nginx:
    image: nginx:alpine
    container_name: webtoon_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - webtoon_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: webtoon_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: gunyz.62@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 62Naruto62.
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - webtoon_network

volumes:
  postgres_data:

networks:
  webtoon_network:
    driver: bridge
