version: '3.8'

services:
  # 1. VERİTABANI (PostgreSQL)
  db:
    image: postgres:15
    container_name: webtoon_db
    restart: always
    environment:
      POSTGRES_USER: webtoon_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: webtoon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webtoon_network
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U webtoon_admin -d webtoon_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. BACKEND (FastAPI)
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: webtoon_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DÜZELTME 1: Şifreler artık .env dosyasından çekiliyor (Github güvenliği için)
      DB_CONNECTION: ${DB_CONNECTION}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./Backend:/app
      # 🔥 KRİTİK: Docker restart atınca resimlerin silinmemesi için Volume bağlantıları eklendi
      - webtoon_covers:/app/static/covers
      - webtoon_banners:/app/static/banners
      - webtoon_images:/app/static/images
    ports:
      - "8000:8000"
    networks:
      - webtoon_network

  # 3. FRONTEND (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: webtoon_frontend
    restart: always
    depends_on:
      - backend
    environment:
      # Sunucunun gerçek IP'si / Domaini - tarayıcılar apiyi buradan çekecek
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Localhost API Fallback ihtimaline karşı HTTP URL (Nginx yoksa direkt port tüneli)
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Node production modunda çalıştırılıyor
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=4096"
    ports:
      - "3000:3000"
    networks:
      - webtoon_network

volumes:
  postgres_data:
  webtoon_covers:
  webtoon_banners:
  webtoon_images:


networks:
  webtoon_network:
    driver: bridge
