events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ==========================================
    # GZIP SIKISTIRMA (SEO ve Performans)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/html
        font/woff
        font/woff2
        image/svg+xml;

    # ==========================================
    # LOGGING
    # ==========================================
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    sendfile on;
    keepalive_timeout 65;

    # ==========================================
    # SUNUCU KONFIGURASYON
    # ==========================================
    server {
        listen 80;
        server_name kaosmanga.net www.kaosmanga.net _;

        # Dosya yükleme boyutu
        client_max_body_size 50M;

        # ==========================================
        # API ISTEKLERI -> BACKEND (FastAPI :8000)
        # ==========================================
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
        }

        # ==========================================
        # STATIC DOSYALAR -> BACKEND (Resimler)
        # ==========================================
        location /static/ {
            proxy_pass http://backend:8000/static/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Statik dosyalar icin cache
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ==========================================
        # DB ADMIN PANELI -> BACKEND
        # ==========================================
        location /db-admin/ {
            proxy_pass http://backend:8000/db-admin/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # HER SEY -> FRONTEND (Next.js :3000)
        # ==========================================
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
